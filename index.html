<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#13161d">
  <title>Site resources · Phone lines</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    :root { --font: "DM Sans", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    body { font-family: var(--font); }

    :root {
      color-scheme: dark;
      --bg: #0f1218;
      --bg-elev: #161b24;
      --surface: #1a202c;
      --border: rgba(255, 255, 255, 0.1);
      --text: #f1f5f9;
      --muted: #94a3b8;
      --security: #2dd4bf;
      --security-bg: rgba(45, 212, 191, 0.12);
      --emergency: #fb7185;
      --emergency-bg: rgba(251, 113, 133, 0.12);
      --neutral-accent: #64748b;
      --focus: #fbbf24;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --radius: 1rem;
    }
    @media (prefers-color-scheme: light) {
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --bg-elev: #f1f5f9;
        --surface: #ffffff;
        --border: rgba(15, 23, 42, 0.12);
        --text: #0f172a;
        --muted: #64748b;
        --security: #0d9488;
        --security-bg: rgba(13, 148, 136, 0.1);
        --emergency: #e11d48;
        --emergency-bg: rgba(225, 29, 72, 0.08);
        --neutral-accent: #64748b;
      }
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font);
      font-size: 1rem;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    .page {
      max-width: 26rem;
      margin: 0 auto;
      padding: 1.25rem 1.1rem 2.5rem;
    }
    .intro-kicker {
      margin: 0 0 0.35rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .intro-title {
      margin: 0 0 0.6rem;
      font-size: clamp(1.45rem, 5.5vw, 1.85rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }
    .intro-lead {
      margin: 0;
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.5;
      max-width: 38ch;
    }
    .line-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1.75rem;
    }
    .dial-card {
      display: flex;
      align-items: stretch;
      gap: 0;
      text-decoration: none;
      color: inherit;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
      min-height: 5.5rem;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .dial-card:hover {
      border-color: var(--muted);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.18);
    }
    @media (prefers-color-scheme: light) {
      .dial-card:hover {
        box-shadow: 0 6px 20px rgba(15, 23, 42, 0.08);
      }
    }
    .dial-card:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 3px;
    }
    .dial-card__icon {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 4rem;
      min-width: 4rem;
      padding: 0.75rem 0.5rem 0.75rem 0.85rem;
      background: var(--bg-elev);
    }
    .dial-card__icon img {
      width: 2.5rem;
      height: 2.5rem;
      object-fit: contain;
      display: block;
    }
    .dial-card__main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.85rem 0.75rem 0.85rem 0.35rem;
      min-width: 0;
    }
    .dial-card__title {
      margin: 0;
      font-size: clamp(1.05rem, 4.2vw, 1.35rem);
      font-weight: 700;
      line-height: 1.25;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .dial-card__phone {
      margin: 0;
      font-size: 0.78rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      color: var(--muted);
      line-height: 1.35;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .dial-card__hint {
      margin: 0.15rem 0 0;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--muted);
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .dial-card--security {
      border-left: 3px solid var(--security);
    }
    .dial-card--medical-emergency {
      border-left: 3px solid var(--emergency);
    }
    .dial-card--other {
      border-left: 3px solid var(--neutral-accent);
    }
    .foot {
      margin-top: 2rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }
    .foot-note {
      margin: 0;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.45;
    }

  </style>
</head>
<body>
  <div class="page">
    <header class="intro">
      <p class="intro-kicker">This site</p>
      <h1 class="intro-title">Access site resources</h1>
      <p class="intro-lead">Use the numbers below for on-site help and services—security, medical emergencies, and other needs. Tap to place a call from your phone.</p>
    </header>
    <main>
      <nav class="line-grid" aria-label="Site resource phone lines">
<article class="line-slot" data-line-id="security">
  <a class="dial-card dial-card--security" href="tel:+442477092465">
    <div class="dial-card__icon" aria-hidden="true">
      <img src="assets/icons/security.svg" alt="" width="40" height="40" decoding="async">
    </div>
    <div class="dial-card__main">
      <p class="dial-card__title">Security</p>
      <p class="dial-card__phone">02477 092465</p>
      <p class="dial-card__hint">Tap to call</p>
    </div>
  </a>
</article>
<article class="line-slot" data-line-id="medical-emergency">
  <a class="dial-card dial-card--medical-emergency" href="tel:+442477092474">
    <div class="dial-card__icon" aria-hidden="true">
      <img src="assets/icons/medical.svg" alt="" width="40" height="40" decoding="async">
    </div>
    <div class="dial-card__main">
      <p class="dial-card__title">Medical emergency</p>
      <p class="dial-card__phone">02477 092474</p>
      <p class="dial-card__hint">Tap to call</p>
    </div>
  </a>
</article>
      </nav>
    </main>

  </div>
</body>
</html>
