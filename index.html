<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg-deep: #0a0c10;
      --bg: #13161d;
      --surface: rgba(28, 32, 42, 0.72);
      --surface-solid: #1c222e;
      --border: rgba(255, 255, 255, 0.09);
      --border-strong: rgba(255, 255, 255, 0.14);
      --text: #f8fafc;
      --muted: #94a3b8;
      --security: #5eead4;
      --security-dim: rgba(94, 234, 212, 0.14);
      --security-glow: rgba(94, 234, 212, 0.22);
      --emergency: #fda4af;
      --emergency-dim: rgba(253, 164, 175, 0.12);
      --emergency-glow: rgba(253, 164, 175, 0.2);
      --focus: #fcd34d;
      --font: "Instrument Sans", system-ui, sans-serif;
      --font-display: "Outfit", var(--font);
      --radius-lg: 1.125rem;
      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.35);
      --shadow-card-hover: 0 12px 40px rgba(0, 0, 0, 0.45);
    }
    @media (prefers-color-scheme: light) {
      :root {
        color-scheme: light;
        --bg-deep: #eef1f6;
        --bg: #f8fafc;
        --surface: rgba(255, 255, 255, 0.88);
        --surface-solid: #ffffff;
        --border: rgba(15, 23, 42, 0.08);
        --border-strong: rgba(15, 23, 42, 0.12);
        --text: #0f172a;
        --muted: #64748b;
        --security: #0d9488;
        --security-dim: rgba(13, 148, 136, 0.1);
        --security-glow: rgba(13, 148, 136, 0.15);
        --emergency: #e11d48;
        --emergency-dim: rgba(225, 29, 72, 0.08);
        --emergency-glow: rgba(225, 29, 72, 0.12);
        --shadow-card: 0 4px 20px rgba(15, 23, 42, 0.08);
        --shadow-card-hover: 0 16px 48px rgba(15, 23, 42, 0.12);
      }
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font);
      font-size: 1.0625rem;
      line-height: 1.5;
      color: var(--text);
      background-color: var(--bg-deep);
      background-image:
        radial-gradient(ellipse 120% 80% at 50% -30%, rgba(94, 234, 212, 0.08), transparent 50%),
        radial-gradient(ellipse 70% 50% at 100% 20%, rgba(129, 140, 248, 0.06), transparent 45%),
        radial-gradient(ellipse 60% 45% at 0% 80%, rgba(253, 164, 175, 0.06), transparent 50%),
        linear-gradient(165deg, var(--bg-deep) 0%, var(--bg) 42%, var(--bg) 100%);
      -webkit-font-smoothing: antialiased;
    }
    @media (prefers-color-scheme: light) {
      body {
        background-image:
          radial-gradient(ellipse 100% 70% at 50% -20%, rgba(13, 148, 136, 0.07), transparent 55%),
          radial-gradient(ellipse 60% 50% at 100% 0%, rgba(99, 102, 241, 0.05), transparent 50%),
          linear-gradient(180deg, var(--bg-deep) 0%, var(--bg) 100%);
      }
    }
    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 28rem;
      margin: 0 auto;
      padding: 1rem 1.25rem 2.5rem;
      position: relative;
    }
    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      min-height: 2.75rem;
      margin-bottom: 0.25rem;
    }
    html[dir="rtl"] .top-bar {
      justify-content: flex-start;
    }
    .lang-select {
      font: inherit;
      font-size: 0.8125rem;
      font-weight: 600;
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--text);
      cursor: pointer;
      max-width: 10rem;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    @media (prefers-color-scheme: light) {
      .lang-select {
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
      }
    }
    .lang-select:hover {
      border-color: var(--border-strong);
    }
    .lang-select:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 3px;
    }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .intro {
      margin-bottom: 2rem;
      padding-bottom: 0.25rem;
    }
    .intro-kicker {
      margin: 0 0 0.5rem;
      font-size: 0.6875rem;
      font-weight: 700;
      font-style: italic;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .intro-kicker::after {
      content: "";
      display: block;
      width: 2.5rem;
      height: 3px;
      margin-top: 0.65rem;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--security), var(--emergency));
      opacity: 0.85;
    }
    .intro-title {
      margin: 0 0 0.65rem;
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 6vw, 2.125rem);
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 1.12;
    }
    .intro-lead {
      margin: 0;
      max-width: 36ch;
      font-size: 0.9375rem;
      color: var(--muted);
      line-height: 1.55;
    }
    .line-grid {
      display: flex;
      flex-direction: column;
      gap: 1.35rem;
      flex: 1;
    }
    .line-slot {
      margin: 0;
    }
    .dial-card {
      display: flex;
      align-items: stretch;
      gap: 0;
      text-decoration: none;
      color: inherit;
      padding: 0;
      min-height: 8.75rem;
      border-radius: 1.25rem;
      border: 1px solid var(--border);
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.22s cubic-bezier(0.34, 1.2, 0.64, 1), box-shadow 0.22s ease, border-color 0.2s ease;
    }
    @media (prefers-reduced-motion: reduce) {
      .dial-card {
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      .dial-card:hover {
        transform: none;
      }
    }
    .dial-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-card-hover);
      border-color: var(--border-strong);
    }
    .dial-card:active {
      transform: translateY(-1px);
    }
    @media (prefers-reduced-motion: reduce) {
      .dial-card:active {
        transform: none;
      }
    }
    .dial-card:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 4px;
    }
    .dial-card__icon {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      align-self: stretch;
      width: 4.5rem;
      min-width: 4.5rem;
      min-height: 100%;
      padding-inline-start: 1rem;
      padding-inline-end: 0.5rem;
    }
    .dial-card__icon img {
      width: 3rem;
      height: 3rem;
      max-width: 100%;
      object-fit: contain;
      display: block;
    }
    .dial-card__main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 1.25rem 0.75rem 1.25rem 0.25rem;
      min-width: 0;
      min-height: 0;
    }
    html[dir="rtl"] .dial-card__main {
      padding: 1.25rem 0.25rem 1.25rem 0.75rem;
    }
    html[dir="rtl"] .dial-card__icon {
      padding-inline-start: 0.5rem;
      padding-inline-end: 1rem;
    }
    .dial-card__label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0;
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
      hyphens: auto;
      line-height: 1.4;
    }
    .dial-card__num {
      display: block;
      font-family: var(--font-display);
      font-size: clamp(1.35rem, 5.5vw, 2.1rem);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      line-height: 1.2;
      margin-top: 0.65rem;
      padding-top: 0.65rem;
      border-top: 1px solid var(--border);
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .dial-card__hint {
      display: block;
      margin-top: auto;
      padding-top: 0.65rem;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--muted);
      opacity: 0.92;
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
      hyphens: auto;
      line-height: 1.45;
    }
    .dial-card__chevron {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 3.75rem;
      min-width: 3.75rem;
      flex-shrink: 0;
      font-size: 1.65rem;
      font-weight: 300;
      line-height: 1;
      color: var(--muted);
      opacity: 0.4;
      border-left: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.12);
    }
    @media (prefers-color-scheme: light) {
      .dial-card__chevron {
        background: rgba(15, 23, 42, 0.04);
      }
    }
    html[dir="rtl"] .dial-card__chevron {
      border-left: none;
      border-right: 1px solid var(--border);
    }
    .dial-card--security {
      border-left: 4px solid var(--security);
      background: linear-gradient(135deg, var(--surface) 0%, var(--security-dim) 100%);
    }
    .dial-card--security:hover {
      box-shadow: var(--shadow-card-hover), 0 0 0 1px var(--security-glow);
    }
    .dial-card--medical-emergency {
      border-left: 4px solid var(--emergency);
      background: linear-gradient(135deg, var(--surface) 0%, var(--emergency-dim) 100%);
    }
    .dial-card--medical-emergency:hover {
      box-shadow: var(--shadow-card-hover), 0 0 0 1px var(--emergency-glow);
    }
    .dial-card--other {
      border-left: 4px solid var(--muted);
      background: var(--surface);
    }
    html[dir="rtl"] .dial-card--security {
      border-left: none;
      border-right: 4px solid var(--security);
    }
    html[dir="rtl"] .dial-card--medical-emergency {
      border-left: none;
      border-right: 4px solid var(--emergency);
    }
    html[dir="rtl"] .dial-card--other {
      border-left: none;
      border-right: 4px solid var(--muted);
    }
    .foot {
      margin-top: 2.25rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .foot-note {
      margin: 0;
      font-size: 0.8125rem;
      color: var(--muted);
      line-height: 1.45;
    }
  </style>

</head>
<body>
  <div class="page">
    <header class="top-bar">
      <label class="visually-hidden" for="lang-select"><span data-i18n="labelLanguage">Language</span></label>
      <select id="lang-select" class="lang-select" autocomplete="off" aria-label="Language"></select>
    </header>

    <div class="intro">
      <p class="intro-kicker" data-i18n="eyebrow">This site</p>
      <h1 class="intro-title" data-i18n="heading">Access site resources</h1>
      <p class="intro-lead" data-i18n="lead">Use the numbers below for on-site help and services—security, medical emergencies, and other needs. Tap to place a call from your phone.</p>
    </div>

    <main id="main-lines" role="main">
      <nav id="contact-nav" class="line-grid" aria-label="Site resource phone lines">

          <a class="dial-card dial-card--security" href="tel:+442477092465">
            <div class="dial-card__icon" aria-hidden="true">
              <img src="assets/icons/security.svg" alt="" width="48" height="48" decoding="async">
            </div>
            <div class="dial-card__main">
              <span class="dial-card__label">Security</span>
              <span class="dial-card__num">02477 092465</span>
              <span class="dial-card__hint" data-i18n="tapToCall">Tap to call</span>
            </div>
            <span class="dial-card__chevron" aria-hidden="true">›</span>
          </a>
        </article>
        <article class="line-slot" data-line-id="medical-emergency">
          <a class="dial-card dial-card--medical-emergency" href="tel:+442477092474">
            <div class="dial-card__icon" aria-hidden="true">
              <img src="assets/icons/medical.svg" alt="" width="48" height="48" decoding="async">
            </div>
            <div class="dial-card__main">
              <span class="dial-card__label">Medical emergency</span>
              <span class="dial-card__num">02477 092474</span>
              <span class="dial-card__hint" data-i18n="tapToCall">Tap to call</span>
            </div>
            <span class="dial-card__chevron" aria-hidden="true">›</span>
          </a>
        </article>
      </nav>
    </main>

    <footer class="foot">
      <p id="foot-note" class="foot-note" hidden></p>
    </footer>

  <script src="assets/i18n.js" defer></script>
  <script src="assets/app.js" defer></script>
