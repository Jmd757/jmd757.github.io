<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0c1222">
  <title>Phone lines · Security & medical</title>
  <!-- Live page: edit config/site.json (lines) and locales/messages.json (languages). Source: source/index.html -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark light;
      --font: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
      --bg-deep: #070b14;
      --bg-mid: #0c1222;
      --card: rgba(20, 28, 48, 0.85);
      --card-border: rgba(255, 255, 255, 0.08);
      --card-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.45);
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent-bar: linear-gradient(90deg, #3b82f6, #06b6d4, #10b981);
      --call: #2563eb;
      --call-soft: rgba(37, 99, 235, 0.2);
      --focus: #fbbf24;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg-deep: #e8eef5;
        --bg-mid: #f1f5f9;
        --card: rgba(255, 255, 255, 0.92);
        --card-border: rgba(15, 23, 42, 0.08);
        --card-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.12);
        --text: #0f172a;
        --text-secondary: #64748b;
        --call-soft: rgba(37, 99, 235, 0.12);
      }
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font);
      font-size: 1rem;
      line-height: 1.5;
      color: var(--text);
      background-color: var(--bg-mid);
      background-image:
        radial-gradient(ellipse 100% 60% at 50% -10%, rgba(59, 130, 246, 0.18), transparent 55%),
        radial-gradient(ellipse 70% 45% at 100% 0%, rgba(6, 182, 212, 0.1), transparent 50%),
        radial-gradient(ellipse 60% 40% at 0% 100%, rgba(16, 185, 129, 0.08), transparent 50%),
        linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mid) 45%, var(--bg-mid) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }
    .shell {
      position: relative;
      width: 100%;
      max-width: 26rem;
    }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .lang-float {
      position: absolute;
      top: 0;
      right: 0;
      z-index: 4;
    }
    html[dir="rtl"] .lang-float {
      right: auto;
      left: 0;
    }
    .lang-select-compact {
      font-family: inherit;
      font-size: 0.6875rem;
      font-weight: 500;
      padding: 0.2rem 1.35rem 0.2rem 0.3rem;
      max-width: min(7.5rem, 42vw);
      line-height: 1.25;
      border-radius: 0.35rem;
      border: 1px solid var(--card-border);
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      cursor: pointer;
    }
    @media (prefers-color-scheme: light) {
      .lang-select-compact {
        background: rgba(255, 255, 255, 0.95);
      }
    }
    .lang-select-compact:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 1px;
    }
    .card {
      position: relative;
      border-radius: 1.25rem;
      padding: 0;
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow: var(--card-shadow);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }
    .card::before {
      content: "";
      display: block;
      height: 4px;
      background: var(--accent-bar);
    }
    .card-inner {
      padding: 1.6rem 4.75rem 1.5rem 1.5rem;
    }
    html[dir="rtl"] .card-inner {
      padding: 1.6rem 1.5rem 1.5rem 4.75rem;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      margin-bottom: 1.25rem;
    }
    .brand-icon {
      flex-shrink: 0;
      width: 2.75rem;
      height: 2.75rem;
      padding: 0.5rem;
      border-radius: 0.875rem;
      background: linear-gradient(145deg, rgba(59, 130, 246, 0.25), rgba(6, 182, 212, 0.15));
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #7dd3fc;
    }
    @media (prefers-color-scheme: light) {
      .brand-icon {
        background: linear-gradient(145deg, rgba(37, 99, 235, 0.12), rgba(6, 182, 212, 0.1));
        border-color: rgba(15, 23, 42, 0.08);
        color: #2563eb;
      }
    }
    .brand-icon svg,
    .brand-icon img {
      display: block;
      width: 100%;
      height: 100%;
    }
    .brand-icon img {
      object-fit: contain;
    }
    .brand-text .eyebrow {
      margin: 0;
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }
    .brand-text h1 {
      margin: 0.2rem 0 0;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .lead {
      margin: 0 0 1.25rem;
      font-size: 0.9375rem;
      color: var(--text-secondary);
      line-height: 1.55;
    }
    .actions {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
    }
    .action {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.125rem;
      border-radius: 0.875rem;
      text-decoration: none;
      color: inherit;
      border: 1px solid var(--card-border);
      background: rgba(255, 255, 255, 0.03);
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
    }
    @media (prefers-color-scheme: light) {
      .action {
        background: rgba(15, 23, 42, 0.03);
      }
    }
    .action:hover {
      border-color: rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.06);
    }
    @media (prefers-color-scheme: light) {
      .action:hover {
        border-color: rgba(15, 23, 42, 0.12);
        background: rgba(15, 23, 42, 0.04);
      }
    }
    .action:active {
      transform: scale(0.99);
    }
    .action:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }
    .action-icon {
      flex-shrink: 0;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .action-icon svg,
    .action-icon img {
      width: 1.25rem;
      height: 1.25rem;
    }
    .action-icon img {
      display: block;
      object-fit: contain;
    }
    .action-call .action-icon {
      background: var(--call-soft);
      color: var(--call);
    }
    .action-body {
      flex: 1;
      min-width: 0;
      text-align: start;
    }
    .action-title {
      display: block;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: -0.01em;
    }
    .action-desc {
      display: block;
      margin-top: 0.15rem;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      font-weight: 400;
    }
    .action-arrow {
      flex-shrink: 0;
      font-size: 1.125rem;
      color: var(--text-secondary);
      opacity: 0.7;
    }
    .foot {
      margin-top: 1.375rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--card-border);
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-align: center;
      line-height: 1.45;
    }
    .foot-note {
      margin: 0;
      font-size: 0.6875rem;
      line-height: 1.4;
      color: var(--text-secondary);
    }
    html[dir="rtl"] .brand {
      flex-direction: row-reverse;
    }
    html[dir="rtl"] .action {
      flex-direction: row-reverse;
    }
    html[dir="rtl"] .action-body {
      text-align: right;
    }
    html[dir="rtl"] .action-arrow {
      transform: scaleX(-1);
    }
    html[dir="rtl"] .lang-select-compact {
      text-align: right;
    }
  </style>
</head>
<body>
  <!-- Lines: config/site.json · UI languages: locales/messages.json (see repo docs) -->
  <div class="shell">
    <div class="lang-float">
      <label class="visually-hidden" for="lang-select"><span data-i18n="labelLanguage">Language</span></label>
      <select id="lang-select" class="lang-select-compact" autocomplete="off"></select>
    </div>
    <main class="card" role="main">
      <div class="card-inner">
        <div class="brand">
          <div class="brand-icon" id="brand-icon-root" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </div>
          <div class="brand-text">
            <p class="eyebrow" data-i18n="eyebrow">Contact</p>
            <h1 data-i18n="heading">Phone numbers</h1>
          </div>
        </div>
        <p class="lead" data-i18n="lead">Tap the line you need. Your device will start a normal voice call.</p>
        <nav id="contact-nav" aria-label="Phone lines">
          <ul id="lines-list" class="actions"></ul>
        </nav>
        <footer class="foot">
          <p id="foot-note" class="foot-note" hidden></p>
        </footer>
      </div>
    </main>
  </div>
  <script src="assets/i18n.js" defer></script>
  <script src="assets/app.js" defer></script>
</body>
</html>
