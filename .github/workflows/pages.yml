# Builds static HTML from JSON, then publishes *.html, assets/icons/*.svg, and .nojekyll.
# Repo → Settings → Pages → Build: GitHub Actions (not "Deploy from branch").

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          python3 tools/render_static_pages.py
          mkdir -p _site/assets/icons
          cp ./*.html _site/
          cp .nojekyll _site/
          cp assets/icons/*.svg _site/assets/icons/
          if [ -f _headers ]; then cp _headers _site/; fi

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
