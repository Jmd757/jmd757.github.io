# Publishes index.html, assets/*.js, and .nojekyll to GitHub Pages.
# Repo → Settings → Pages → Build: GitHub Actions (not "Deploy from branch").

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site/assets
          cp index.html _site/
          cp .nojekyll _site/
          cp assets/*.js _site/assets/
          cp -r config locales _site/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
